<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="scroll-progress" class="scroll-progress-bar"></div>
    <div id="auth-container"></div>
    <div id="app-container" class="app-container" style="display: none;">
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-shield-alt"></i>
                <span>SmartCMS</span>
            </div>
            <ul class="nav-links" id="sidebar-links">
                <!-- Roles links injected here -->
            </ul>
            <div style="margin-top: auto; padding: 1rem;">
                <button class="btn btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="main-content">
            <header>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div class="hamburger dashboard-hamburger" onclick="toggleSidebar()">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <h1 id="page-title">Dashboard</h1>
                </div>
                <div class="user-profile">
                    <div id="notification-bell" style="position: relative; cursor: pointer;">
                        <i class="fas fa-bell fa-lg"></i>
                        <span id="notif-count" class="badge"></span>
                    </div>
                    <span id="user-name-display" style="font-weight: 600;">User Name</span>
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=User"
                        style="width: 40px; border-radius: 50%;">
                </div>
            </header>

            <div id="content-display">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal">
        <div class="card" style="max-width: 900px; width: 95%; position: relative; margin: auto;">
            <button onclick="closeModal()"
                style="position: absolute; right: 1rem; top: 1rem; border: none; background: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
</body>

</html>
